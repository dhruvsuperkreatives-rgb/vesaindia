<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Aashayein</title>
    <link rel="icon" type="image/jpeg" href="/favicon.jpeg">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#3B82F6',
                        secondary: '#F97316',
                        'primary-light': 'rgba(59,130,246,0.1)',
                        'secondary-light': 'rgba(249,115,22,0.1)',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <style>
        :root {
            --primary: #3B82F6;
            --secondary: #F97316;
            --primary-light: rgba(59, 130, 246, 0.1);
            --secondary-light: rgba(249, 115, 22, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: #f8fafc;
            color: #1e293b;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        /* Mesh Grid Background */
        .mesh-bg {
            background-image: 
                linear-gradient(var(--primary-light) 1px, transparent 1px),
                linear-gradient(90deg, var(--primary-light) 1px, transparent 1px);
            background-size: 50px 50px;
            position: fixed;
            inset: 0;
            opacity: 0.3;
            z-index: -2;
            animation: meshMove 20s linear infinite;
        }
        @keyframes meshMove {
            0% { background-position: 0 0; }
            100% { background-position: 50px 50px; }
        }

        /* Gradient Orbs */
        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.15;
            z-index: -1;
            animation: orbPulse 12s ease-in-out infinite;
        }
        .orb-1 { width: 400px; height: 400px; background: var(--primary); top: -50px; left: -100px; animation-delay: 0s; }
        .orb-2 { width: 300px; height: 300px; background: var(--secondary); bottom: -50px; right: -50px; animation-delay: -4s; }

        @keyframes orbPulse {
            0%, 100% { transform: scale(1) translate(0, 0); }
            33% { transform: scale(1.1) translate(30px, -20px); }
            66% { transform: scale(0.9) translate(-20px, 30px); }
        }

        /* Login Card */
        .auth-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(20px);
            border-radius: 1.5rem;
            width: 100%;
            max-width: 850px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.5);
            position: relative;
            z-index: 10;
            display: flex;
            overflow: hidden;
        }

        .auth-form-side {
            flex: 1.1;
            padding: 3rem;
        }

        .auth-image-side {
            flex: 0.9;
            display: block;
            position: relative;
            background: #ffffff;
            padding: 24px;
        }

        .auth-image-side img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            object-position: center;
            display: block;
        }

        @media (max-width: 768px) {
            .auth-card {
                max-width: 450px;
                flex-direction: column;
            }
            .auth-image-side {
                display: none;
            }
        }

        .auth-header { text-align: center; margin-bottom: 2rem; }
        .auth-logo {
            width: 56px; height: 56px; border-radius: 14px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            display: flex; align-items: center; justify-content: center;
            color: white; font-size: 1.5rem; margin: 0 auto 1rem;
            box-shadow: 0 10px 25px rgba(59, 130, 246, 0.3);
        }
        .auth-header h1 { font-size: 1.5rem; font-weight: 800; color: #0f172a; margin-bottom: 0.25rem; }
        .auth-header p { color: #64748b; font-size: 0.875rem; }

        /* Form Controls */
        .form-group { margin-bottom: 1.25rem; }
        .form-label { display: block; font-size: 0.875rem; font-weight: 600; color: #1e293b; margin-bottom: 0.5rem; }
        .form-input {
            width: 100%; padding: 0.875rem 1rem; border: 1px solid #cbd5e1; border-radius: 0.75rem;
            background: #f8fafc; color: #0f172a; font-size: 0.9375rem; font-family: inherit;
            transition: all 0.3s ease; outline: none;
        }
        .form-input:focus { border-color: var(--primary); background: white; box-shadow: 0 0 0 4px var(--primary-light); }
        
        .forgot-password { display: block; text-align: right; font-size: 0.8125rem; font-weight: 600; color: var(--primary); text-decoration: none; margin-top: 0.5rem; }
        .forgot-password:hover { text-decoration: underline; }

        /* Button */
        .btn-submit {
            width: 100%; padding: 0.875rem; background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white; border: none; border-radius: 0.75rem; font-size: 1rem; font-weight: 700;
            cursor: pointer; transition: all 0.3s ease; display: flex; align-items: center; justify-content: center;
            gap: 0.5rem; margin-top: 2rem; box-shadow: 0 10px 25px rgba(59, 130, 246, 0.3);
        }
        .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 15px 30px rgba(59, 130, 246, 0.4); }

        .auth-footer { text-align: center; margin-top: 2rem; font-size: 0.875rem; color: #64748b; }
        .auth-footer a { font-weight: 600; color: var(--primary); text-decoration: none; }
        .auth-footer a:hover { text-decoration: underline; }
    </style>
</head>
<body>

    <!-- Background Elements -->
    <div class="mesh-bg"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <!-- Login Card -->
    <div class="auth-card">
        
        <div class="auth-form-side">
            <div class="auth-header">
                <div class="auth-logo" style="background: transparent; box-shadow: none;"><img src="/sidebar.jpeg" alt="Logo" style="width: 56px; height: 56px; border-radius: 14px; object-fit: cover;"></div>
                <h1>Welcome Back</h1>
                <p>Sign in to your Aashayein account</p>
            </div>

            <form id="loginForm">
                
                <div class="form-group">
                    <label class="form-label" for="email">Email Address</label>
                    <input type="email" id="email" name="email" class="form-input" placeholder="admin@example.com" required>
                </div>

                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <input type="password" id="password" name="password" class="form-input" placeholder="••••••••" required>
                    <a href="#" class="forgot-password">Forgot password?</a>
                </div>

                <button type="submit" class="btn-submit">
                    Sign In <i class="fas fa-arrow-right"></i>
                </button>

            </form>

            <div class="auth-footer">
                Don't have an account? <a href="#">Contact Admin</a>
            </div>
            <div class="auth-footer" style="margin-top: 0.5rem;">
                <a href="dashboard.html" style="color: #64748b; font-weight: 500;"><i class="fas fa-arrow-left"></i> Return to Dashboard</a>
            </div>
        </div>

        <div class="auth-image-side">
            <img src="/favicon.jpeg" alt="Aashayein Platform Preview">
        </div>

    </div>


<script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            // 1. Stop the form from sending a POST request
            e.preventDefault(); 

            // 2. Grab the values
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            console.log("Attempting to log in with:", email);
            
            // TODO: In the future, Supabase code goes here. 
            // If the login is successful, THEN you run the redirect below:

            // 3. Redirect the user to the dashboard using JavaScript
            window.location.href = "dashboard.html";
        });
    </script>
</body>
</html>
