<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Organization Enrollment - Project</title>
    <link rel="icon" type="image/jpeg" href="/favicon.jpeg">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#3B82F6',
                        secondary: '#F97316',
                        'primary-light': 'rgba(59,130,246,0.1)',
                        'secondary-light': 'rgba(249,115,22,0.1)',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <style>
        :root {
            --primary: #3B82F6;
            --secondary: #F97316;
            --primary-light: rgba(59, 130, 246, 0.1);
            --secondary-light: rgba(249, 115, 22, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #f8fafc;
            color: #1e293b;
            overflow: hidden; /* Added to support sidebar layout */
            display: flex;
            height: 100vh;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }

        /* Mesh Grid Background */
        .mesh-bg {
            background-image: 
                linear-gradient(var(--primary-light) 1px, transparent 1px),
                linear-gradient(90deg, var(--primary-light) 1px, transparent 1px);
            background-size: 50px 50px;
            position: fixed;
            inset: 0;
            opacity: 0.3;
            z-index: -2;
            animation: meshMove 20s linear infinite;
        }

        @keyframes meshMove {
            0% { background-position: 0 0; }
            100% { background-position: 50px 50px; }
        }

        /* Gradient Orbs */
        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.15;
            z-index: -1;
            animation: orbPulse 12s ease-in-out infinite;
        }
        .orb-1 { width: 500px; height: 500px; background: var(--primary); top: -100px; right: -100px; animation-delay: 0s; }
        .orb-2 { width: 400px; height: 400px; background: var(--secondary); bottom: -100px; left: -100px; animation-delay: -4s; }

        @keyframes orbPulse {
            0%, 100% { transform: scale(1) translate(0, 0); }
            33% { transform: scale(1.1) translate(30px, -20px); }
            66% { transform: scale(0.9) translate(-20px, 30px); }
        }

        /* Main Content Wrappers */
        .main-content {
            flex: 1;
            overflow-y: auto;
            position: relative;
            z-index: 1;
        }

        .top-header {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            padding: 1.25rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
            position: sticky;
            top: 0;
            z-index: 20;
        }

        .header-title-wrap h1 { font-size: 1.25rem; font-weight: 700; color: #0f172a; margin-bottom: 0.25rem;}
        
        .form-layout-wrapper {
            display: flex;
            justify-content: center;
            padding: 3rem 1rem;
        }

        /* Form Container */
        .form-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(20px);
            border-radius: 1.5rem;
            padding: 3rem;
            width: 100%;
            max-width: 800px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        /* Form Header */
        .form-header { text-align: center; margin-bottom: 2.5rem; }
        .form-header h1 { font-size: 2rem; font-weight: 800; color: #0f172a; margin-bottom: 0.5rem; }
        .form-header p { color: #64748b; font-size: 1rem; }

        /* Form Sections */
        .section-title {
            font-size: 0.875rem; font-weight: 700; color: var(--primary); text-transform: uppercase;
            letter-spacing: 0.1em; margin-bottom: 1.5rem; padding-bottom: 0.5rem;
            border-bottom: 2px solid var(--primary-light); display: flex; align-items: center; gap: 0.5rem;
        }

        /* Form Controls */
        .form-group { margin-bottom: 1.5rem; }
        .form-label { display: block; font-size: 0.875rem; font-weight: 600; color: #1e293b; margin-bottom: 0.5rem; }
        .form-hint { font-size: 0.75rem; color: #64748b; margin-left: 0.5rem; font-weight: 400; display: block; margin-top: 0.25rem;}
        .form-input, .form-textarea {
            width: 100%; padding: 0.875rem 1rem; border: 1px solid #cbd5e1; border-radius: 0.75rem;
            background: #f8fafc; color: #0f172a; font-size: 1rem; font-family: inherit;
            transition: all 0.3s ease; outline: none;
        }
        .form-input:focus, .form-textarea:focus { border-color: var(--primary); background: white; box-shadow: 0 0 0 4px var(--primary-light); }
        .form-textarea { resize: vertical; min-height: 100px; }

        /* Custom Radio Buttons */
        .radio-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; }
        .radio-label {
            display: flex; align-items: center; gap: 0.75rem; padding: 1rem; border: 1px solid #cbd5e1;
            border-radius: 0.75rem; background: #f8fafc; cursor: pointer; transition: all 0.2s ease;
            font-size: 0.875rem; font-weight: 500; color: #475569;
        }
        .radio-label:hover { border-color: var(--primary); background: white; }
        .radio-input { width: 1.25rem; height: 1.25rem; accent-color: var(--primary); flex-shrink: 0; cursor: pointer; }
        .radio-input:checked + .radio-text { color: var(--primary); font-weight: 600; }
        .radio-input:checked ~ .radio-label { border-color: var(--primary); background: var(--primary-light); box-shadow: 0 0 0 2px var(--primary-light); }

        /* Submit Button */
        .btn-submit {
            width: 100%; padding: 1rem; background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white; border: none; border-radius: 0.75rem; font-size: 1.125rem; font-weight: 700;
            cursor: pointer; transition: all 0.3s ease; display: flex; align-items: center; justify-content: center;
            gap: 0.75rem; margin-top: 2.5rem; box-shadow: 0 10px 25px rgba(59, 130, 246, 0.4);
        }
        .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 15px 35px rgba(59, 130, 246, 0.5); }
        
        /* Mobile menu button styles (used by sidebar.js) */
        .action-btn { display: flex; align-items: center; gap: 0.5rem; padding: 0.6rem 1rem; border-radius: 0.5rem; font-size: 0.875rem; font-weight: 600; cursor: pointer; transition: all 0.2s ease; border: 1px solid #e2e8f0; background: white; color: #475569; }
    </style>
</head>
<body>

    <div class="mesh-bg"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <main class="main-content">
        
        <header class="top-header">
            <div class="header-title-wrap">
                <h1>New Enrollment</h1>
            </div>
            <a href="organization.html" class="action-btn" style="text-decoration: none;">
                <i class="fas fa-arrow-left"></i> Back to Directory
            </a>
        </header>

        <div class="form-layout-wrapper">
            <div class="form-card">
                
                <div class="form-header">
                    <h1>Project Enrollment</h1>
                    <p>Please complete the following details to register your organization.</p>
                </div>

                <form action="#" method="POST">
                    
                    <h2 class="section-title"><i class="fas fa-building"></i> ENTRY DETAILS & CLASSIFICATION</h2>
                    
                    <div class="form-group">
                        <label class="form-label" for="orgName">Official Name of Organization</label>
                        <input type="text" id="orgName" name="orgName" class="form-input" placeholder="e.g., Aashayein Foundation" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Registration Type</label>
                        <div class="radio-grid">
                            <label class="radio-label">
                                <input type="radio" name="regType" value="govState" class="radio-input" required>
                                <span class="radio-text">Government State</span>
                            </label>
                            <label class="radio-label">
                                <input type="radio" name="regType" value="govCentral" class="radio-input">
                                <span class="radio-text">Government Central</span>
                            </label>
                            <label class="radio-label">
                                <input type="radio" name="regType" value="corporate" class="radio-input">
                                <span class="radio-text">Corporate Entity</span>
                            </label>
                            <label class="radio-label">
                                <input type="radio" name="regType" value="educational" class="radio-input">
                                <span class="radio-text">Educational Inst.</span>
                            </label>
                            <label class="radio-label">
                                <input type="radio" name="regType" value="ngo" class="radio-input">
                                <span class="radio-text">NGO / Civil Group</span>
                            </label>
                            <label class="radio-label">
                                <input type="radio" name="regType" value="other" class="radio-input">
                                <span class="radio-text">Other</span>
                            </label>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="workLocation">Core Work Location : Location and its State</label>
                        <input type="text" id="workLocation" name="workLocation" class="form-input" placeholder="e.g., Pune, Maharashtra" required>
                    </div>

                    <div class="mb-10"></div> <h2 class="section-title"><i class="fas fa-map-marked-alt"></i> IDENTIFICATION & GEOGRAPHIC FOOTPRINT</h2>
                    
                    <div class="form-group">
                        <label class="form-label">Implementation Scope</label>
                        <div class="radio-grid" style="grid-template-columns: 1fr;"> <label class="radio-label">
                                <input type="radio" name="implScope" value="single" class="radio-input" required>
                                <div class="radio-text">
                                    <strong>SINGLE OFFICE ONLY:</strong> Operational only at the main headquarters.
                                </div>
                            </label>
                            <label class="radio-label">
                                <input type="radio" name="implScope" value="state" class="radio-input">
                                <div class="radio-text">
                                    <strong>STATE-WIDE (MH):</strong> Deploying across multiple offices within Maharashtra.
                                </div>
                            </label>
                            <label class="radio-label">
                                <input type="radio" name="implScope" value="national" class="radio-input">
                                <div class="radio-text">
                                    <strong>PAN-INDIA NATIONAL:</strong> Full deployment across all corporate/regional branches.
                                </div>
                            </label>
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="form-group">
                            <label class="form-label" for="branchCount">Total Participating Locations</label>
                            <input type="number" id="branchCount" name="branchCount" class="form-input" placeholder="e.g., 5" min="1" required>
                        </div>

                        <div class="form-group">
                            <label class="form-label" for="launchLocation">Initial Launch Location(s)</label>
                            <input type="text" id="launchLocation" name="launchLocation" class="form-input" placeholder="e.g., Pune HQ" required>
                        </div>
                    </div>

                    <div class="mb-10"></div> <h2 class="section-title"><i class="fas fa-users-cog"></i> HEADCOUNT & STRUCTURE</h2>

                    <div class="form-group">
                        <label class="form-label" for="totalParticipants">
                            Estimated Total Participants
                            <span class="form-hint">(Total staff/members to be onboarded)</span>
                        </label>
                        <input type="number" id="totalParticipants" name="totalParticipants" class="form-input" placeholder="e.g., 150" min="1" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="departments">Primary Departments/Wings</label>
                        <textarea id="departments" name="departments" class="form-textarea" placeholder="List the primary departments or operational wings here..."></textarea>
                    </div>

                    <button type="submit" class="btn-submit">
                        Submit Enrollment <i class="fas fa-arrow-right"></i>
                    </button>

                </form>
            </div>
        </div>
    </main>

    <script src="sidebar.js"></script>
</body>
</html>
